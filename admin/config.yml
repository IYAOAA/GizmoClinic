backend:
  name: git-gateway
  branch: main   # or master depending on your GitHub branch

media_folder: "images/uploads"   # where uploaded images will go
public_folder: "/images/uploads" 

collections:
  - name: "posts"            # used in routes
    label: "Blog Posts"       # name in the UI
    folder: "posts"          # folder of your posts
    create: true             # allow creating new posts
    slug: "{{slug}}"         # filename format
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Windows Fix", "General Tips", "Android"] }
      - { label: "Featured Image", name: "thumbnail", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About Page"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
