  <main>
    <h2>Contact Me</h2>
    <p>If you’d like to get in touch, fill out the form below or send an email to <strong>youremail@example.com</strong>.</p>

    <form action="https://formspree.io/f/yourformid" method="POST">
      <label>Your Name<br>
        <input type="text" name="name" required>
      </label><br><br>

      <label>Your Email<br>
        <input type="email" name="email" required>
      </label><br><br>

      <label>Message<br>
        <textarea name="message" rows="5" required></textarea>
      </label><br><br>

      <button type="submit">Send</button>
    </form>
  </main>
