<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GizmoClinic Blog</title>
  <style>
    body { font-family: Arial, sans-serif; background:#fff; margin:0; padding:0; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    article { border-bottom:1px solid #ddd; padding:20px 0; }
    img { max-width:100%; height:auto; }
    h2 { margin-bottom:10px; }
    a.read-more { display:inline-block; margin-top:10px; color:#007BFF; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>GizmoClinic Blog</h1>
    <div id="blog-container">Loading posts...</div>
  </div>

  <script>
    async function loadPosts() {
      const res = await fetch('https://yourapp.onrender.com/posts'); // replace with your Render URL
      const posts = await res.json();
      const container = document.getElementById('blog-container');

      container.innerHTML = posts.map(post => `
        <article>
          <h2>${post.title}</h2>
          <img src="${post.image}" alt="${post.title}">
          <p>${post.excerpt}</p>
          <a class="read-more" href="post.html?id=${post.id}">Read more</a>
        </article>
      `).join('');
    }
    loadPosts();
  </script>
</body>
</html>
